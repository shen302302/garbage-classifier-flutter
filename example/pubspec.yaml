name: com.shen.garbage_claffifier
description: "Demonstrates how to use the ultralytics_yolo plugin."
publish_to: "none"

environment:
  sdk: ^3.8.1
  flutter: ">=3.32.1"

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.0.7
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  archive: ^3.0.0
  http: ^1.0.0
  logger: ^2.0.2+1
  path: ^1.8.3
  share_plus: ^10.0.0

  ultralytics_yolo:
    path: ../

  cupertino_icons: ^1.0.8

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/models/
    - assets/logo.png
    - assets/applogo.png
    - assets/models/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/applogo.png"
